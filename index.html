<body>

<div class="wrapper">
    <div class="brand-header">
        <h1 onclick="triggerAdminMode()">🏳️‍🌈 Gay Dating SMM Promotion</h1>
        <p style="font-size: 12px; color: #777; margin-top: 5px;">chat 🔥 likes 🔥 promotion | LGBTQ+ community</p>
    </div>

    <div id="login-area">
        <div class="login-card">
            <div style="font-size: 2rem; margin-bottom: 10px;">✨💬</div>
            <input type="text" id="nick-input" placeholder="Enter your nickname..." maxlength="24">
            <button class="btn-primary" onclick="joinChat()">➡️ JOIN CHAT</button>

        </div>
    </div>

    <div id="chat-area" style="display: none;">
        <div class="chat-container">
            <div id="chat-window"></div>
            <div class="input-area">
                <div id="replyPreview" style="display: none;" class="reply-badge">
                    💬 Reply to <span id="replyNickSpan"></span>
                    <button class="reply-cancel" onclick="clearReply()">✖</button>
                </div>
                <div class="flex-row">
                    <input type="text" id="msg" placeholder="Type your message...">
                    <button class="send-btn" onclick="sendMessage()">→</button>
                </div>
                <div class="attach-wrapper">
                    <label class="file-label" for="fileInput">📎 Upload photo</label>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    <span id="fileNameDisplay" class="file-info"></span>
                </div>
                <div style="font-size: 11px; text-align: center; margin-top: 8px; color: #5f6c80;">
                    🏳️‍🌈 Friendly chat | click 🔗 to share post | Gay Dating SMM
                </div>
            </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    // FIREBASE CONFIGURATION
    const firebaseConfig = {
        apiKey: "AIzaSyC5L2GQ-2CYj-GNYsHENASdvKVF68rsEb0",
        databaseURL: "https://metaimperiya-14d1b-default-rtdb.europe-west1.firebasedatabase.app",
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const messagesRef = database.ref('messages');

    // GLOBAL VARIABLES
    let currentUser = "";
    let isAdmin = localStorage.getItem('smm_admin_mode') === 'true';
    let activeReplyId = null;
    let activeReplyNick = null;

    // DOM elements
    const loginDiv = document.getElementById('login-area');
    const chatDiv = document.getElementById('chat-area');
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg');
    const fileInput = document.getElementById('fileInput');
    const fileNameSpan = document.getElementById('fileNameDisplay');
    const replyPreviewDiv = document.getElementById('replyPreview');
    const replyNickSpan = document.getElementById('replyNickSpan');

    // JOIN CHAT
    function joinChat() {
        const nickname = document.getElementById('nick-input').value.trim();
        if (!nickname) {
            alert("Please enter your nickname! 🏳️‍🌈");
            return;
        }
        if (nickname.length > 24) {
            alert("Nickname max 24 characters");
            return;
        }
        currentUser = nickname;
        localStorage.setItem('smm_username', currentUser);
        loginDiv.style.display = 'none';
        chatDiv.style.display = 'block';
        clearReply();
        setTimeout(() => {
            if (chatWindow) chatWindow.scrollTop = chatWindow.scrollHeight;
        }, 100);
    }

    // Auto-login if nickname saved
    function tryAutoRestore() {
        const savedNick = localStorage.getItem('smm_username');
        if (savedNick && savedNick.trim()) {
            currentUser = savedNick;
            loginDiv.style.display = 'none';
            chatDiv.style.display = 'block';
            document.getElementById('nick-input').value = savedNick;
            clearReply();
        }
        isAdmin = localStorage.getItem('smm_admin_mode') === 'true';
    }

    function clearReply() {
        activeReplyId = null;
        activeReplyNick = null;
        replyPreviewDiv.style.display = 'none';
        msgInput.placeholder = "Type your message...";
    }

    function setReply(messageId, nick) {
        activeReplyId = messageId;
        activeReplyNick = nick;
        replyNickSpan.innerText = nick;
        replyPreviewDiv.style.display = 'flex';
        msgInput.placeholder = `Reply to ${nick}...`;
        msgInput.focus();
    }

    function shareMessageLink(messageId) {
        const url = new URL(window.location.href);
        url.hash = `msg-${messageId}`;
        navigator.clipboard.writeText(url.toString());
        const toast = document.createElement('div');
        toast.innerText = '🔗 Message link copied!';
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = '#ff9f2e';
        toast.style.color = '#0a0a0a';
        toast.style.padding = '8px 18px';
        toast.style.borderRadius = '60px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '999';
        toast.style.fontSize = '0.85rem';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
    }

    function sendMessage() {
        const text = msgInput.value.trim();
        const file = fileInput.files[0];
        if (!text && !file) return;

        const messageObj = {
            nick: currentUser,
            msg: text || "📸 photo",
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' }),
            timestamp: Date.now(),
            likes: 0
        };

        if (activeReplyId) {
            messageObj.parentID = activeReplyId;
            messageObj.replyToNick = activeReplyNick;
        }

        if (file) {
            if (file.size > 2 * 1024 * 1024) {
                alert("File max 2 MB");
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                messageObj.img = e.target.result;
                messagesRef.push(messageObj);
            };
            reader.readAsDataURL(file);
        } else {
            messagesRef.push(messageObj);
        }

        msgInput.value = '';
        fileInput.value = '';
        fileNameSpan.innerText = '';
        clearReply();
    }

    function deleteMessage(messageId) {
        if (!isAdmin) {
            alert("Admin rights required");
            return;
        }
        if (confirm("Delete this message forever?")) {
            database.ref(`messages/${messageId}`).remove();
        }
    }

    function activateAdminByPassword() {
        const pwd = prompt("🔐 Enter admin password:");
        if (pwd === "12345") {
            localStorage.setItem('smm_admin_mode', 'true');
            isAdmin = true;
            alert("✅ Admin mode activated! Delete buttons appear.");
            messagesRef.once('value', snap => renderMessages(snap));
        } else {
            alert("Wrong password");
        }
    }

    function renderMessages(snapshot) {
        if (!chatWindow) return;
        const messagesArray = [];
        snapshot.forEach(childSnap => {
            const msg = childSnap.val();
            const id = childSnap.key;
            messagesArray.push({ id, ...msg });
        });
        messagesArray.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
        
        chatWindow.innerHTML = '';
        for (let msg of messagesArray) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg-bubble ${msg.parentID ? 'msg-thread' : ''}`;
            if (msg.parentID) {
                msgDiv.style.marginLeft = '20px';
                msgDiv.style.borderLeft = '3px solid #ff9f2e';
            }
            
            let replyInfoHtml = '';
            if (msg.replyToNick && msg.parentID) {
                replyInfoHtml = `<span style="font-size:0.7rem; color:#ffb75e;">↪️ reply to @${escapeHtml(msg.replyToNick)}</span><br>`;
            }
            
            const nickHtml = `<div><span class="msg-nick">🏳️‍🌈 ${escapeHtml(msg.nick)}</span> <span class="msg-time">${escapeHtml(msg.time || 'just now')}</span><br>${replyInfoHtml}</div>`;
            const textHtml = msg.msg ? `<div class="msg-text">${escapeHtml(msg.msg).replace(/\n/g, '<br>')}</div>` : '';
            const imgHtml = msg.img ? `<img class="msg-image" src="${escapeHtml(msg.img)}" alt="photo" onclick="window.open(this.src)">` : '';
            
            msgDiv.innerHTML = `
                ${nickHtml}
                ${textHtml}
                ${imgHtml}
                <div class="msg-actions">
                    <button class="btn-act" onclick="setReply('${msg.id}', '${escapeHtml(msg.nick)}')">💬 Reply</button>
                    <button class="btn-act" onclick="likeMessage('${msg.id}')">👍 ${msg.likes || 0}</button>
                    <button class="btn-act" onclick="shareMessageLink('${msg.id}')">🔗 Share</button>
                    ${isAdmin ? `<button class="btn-act btn-danger" onclick="deleteMessage('${msg.id}')">🗑 Delete</button>` : ''}
                </div>
            `;
            chatWindow.appendChild(msgDiv);
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
    
    function likeMessage(messageId) {
        const likeKey = `liked_${messageId}_${currentUser}`;
        if (localStorage.getItem(likeKey)) {
            const toastMsg = document.createElement('div');
            toastMsg.innerText = '❤️ You already liked this message!';
            toastMsg.style.cssText = 'position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background:#333; color:#ffae42; padding:6px 14px; border-radius:30px; font-size:12px; z-index:1000;';
            document.body.appendChild(toastMsg);
            setTimeout(() => toastMsg.remove(), 1200);
            return;
        }
        const msgRef = database.ref(`messages/${messageId}`);
        msgRef.transaction(current => {
            if (current) {
                const newLikes = (current.likes || 0) + 1;
                return { ...current, likes: newLikes };
            }
            return current;
        }).then(() => {
            localStorage.setItem(likeKey, 'true');
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function triggerAdminMode() {
        if (!isAdmin) {
            activateAdminByPassword();
        } else {
            if (confirm("Disable admin mode? Refresh required.")) {
                localStorage.removeItem('smm_admin_mode');
                location.reload();
            }
        }
    }
    
    fileInput.addEventListener('change', function(e) {
        if (fileInput.files.length > 0) {
            fileNameSpan.innerText = `📷 ${fileInput.files[0].name.slice(0, 20)}`;
        } else {
            fileNameSpan.innerText = '';
        }
    });
    
    msgInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Auto-login on page load
    tryAutoRestore();
    
    messagesRef.on('value', (snapshot) => {
        if (chatDiv.style.display === 'block') {
            renderMessages(snapshot);
        }
    });
</script>
