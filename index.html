<body>
<div class="container">
    <div class="header">
        <h1 onclick="askAdmin()">🏳️‍🌈 Gay Dating SMM</h1>
        <p style="font-size: 12px; color: #666;">chat · likes · promotion · threads</p>
    </div>

    <div id="loginScreen">
        <div class="login-box">
            <div style="font-size: 40px;">💬</div>
            <input type="text" id="nicknameInput" placeholder="Your nickname">
            <button onclick="login()">Join Chat</button>
        </div>
    </div>

    <div id="chatScreen" class="hidden">
        <div class="chat-area">
            <div id="messages"></div>
            <div class="input-area">
                <div id="replyBox" class="hidden reply-to">
                    <span>Replying to <span id="replyToName"></span></span>
                    <button onclick="cancelReply()" style="background: none; color: #ff8c00; padding: 0 0 0 10px;">✖</button>
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Type message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
                <div id="imagePreview" class="hidden preview">
                    <img id="previewImg">
                    <span id="previewName"></span>
                    <button onclick="removeImage()" style="background: #800; color: white; padding: 5px 10px;">Remove</button>
                </div>
                <label class="file-label" for="fileInput">📎 Add photo</label>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const config = {
        apiKey: "AIzaSyC5L2GQ-2CYj-GNYsHENASdvKVF68rsEb0",
        databaseURL: "https://metaimperiya-14d1b-default-rtdb.europe-west1.firebasedatabase.app",
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    const ref = db.ref('messages');

    let currentUser = '';
    let isAdmin = false;
    let replyToId = null;
    let replyToNick = null;
    let pendingImage = null;

    const loginScreen = document.getElementById('loginScreen');
    const chatScreen = document.getElementById('chatScreen');
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('messageInput');
    const nickInput = document.getElementById('nicknameInput');

    function login() {
        const nick = nickInput.value.trim();
        if (!nick) return alert('Enter nickname');
        if (nick.length > 24) return alert('Too long');
        currentUser = nick;
        localStorage.setItem('gay_nick', nick);
        loginScreen.classList.add('hidden');
        chatScreen.classList.remove('hidden');
        msgInput.focus();
    }

    function cancelReply() {
        replyToId = null;
        replyToNick = null;
        document.getElementById('replyBox').classList.add('hidden');
        msgInput.placeholder = 'Type message...';
    }

    function replyTo(id, nick) {
        replyToId = id;
        replyToNick = nick;
        document.getElementById('replyToName').innerText = nick;
        document.getElementById('replyBox').classList.remove('hidden');
        msgInput.placeholder = `Reply to ${nick}...`;
        msgInput.focus();
    }

    function removeImage() {
        pendingImage = null;
        document.getElementById('imagePreview').classList.add('hidden');
        document.getElementById('fileInput').value = '';
    }

    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text && !pendingImage) return;

        const data = {
            nick: currentUser,
            msg: text || '📸 photo',
            time: new Date().toLocaleTimeString(),
            timestamp: Date.now(),
            likes: 0,
            parentId: replyToId || null
        };
        if (pendingImage) data.img = pendingImage;

        ref.push(data);
        
        msgInput.value = '';
        cancelReply();
        removeImage();
    }

    function likeMsg(id) {
        const key = `liked_${id}_${currentUser}`;
        if (localStorage.getItem(key)) return alert('Already liked');
        const msgRef = db.ref(`messages/${id}`);
        msgRef.transaction(m => {
            if (m) m.likes = (m.likes || 0) + 1;
            return m;
        });
        localStorage.setItem(key, 'true');
    }

    function deleteMsg(id) {
        if (!isAdmin) return alert('Admin only');
        if (confirm('Delete forever?')) db.ref(`messages/${id}`).remove();
    }

    function shareMsg(id) {
        const url = window.location.href.split('#')[0] + '#msg-' + id;
        navigator.clipboard.writeText(url);
        alert('Link copied!');
    }

    function askAdmin() {
        const pwd = prompt('Admin password:');
        if (pwd === '12345') {
            isAdmin = true;
            localStorage.setItem('gay_admin', 'true');
            alert('Admin mode ON');
        }
    }

    // Рекурсивная функция для построения дерева комментариев
    function buildMessageTree(msg, allMessages) {
        const children = allMessages.filter(m => m.parentId === msg.id);
        for (let child of children) {
            child.level = (msg.level || 0) + 1;
            child.children = buildMessageTree(child, allMessages);
        }
        return children;
    }

    function renderMessage(msg, level = 0) {
        const margin = level * 20;
        const div = document.createElement('div');
        div.className = 'nested-message';
        div.style.marginLeft = level > 0 ? `${Math.min(margin, 60)}px` : '0';
        div.style.background = level === 0 ? '#151515' : '#1a1f2a';
        
        div.innerHTML = `
            <div class="msg-header">
                <span class="msg-name">${level > 0 ? '└─ ' : '🏳️‍🌈'} ${escapeHtml(msg.nick)}</span>
                <span class="msg-time">${escapeHtml(msg.time)}</span>
            </div>
            <div class="msg-text">${escapeHtml(msg.msg).replace(/\n/g, '<br>')}</div>
            ${msg.img ? `<img class="msg-img" src="${escapeHtml(msg.img)}" onclick="window.open(this.src)">` : ''}
            <div class="msg-buttons">
                <button onclick="replyTo('${msg.id}', '${escapeHtml(msg.nick)}')">💬 Reply</button>
                <button onclick="likeMsg('${msg.id}')">👍 ${msg.likes || 0}</button>
                <button onclick="shareMsg('${msg.id}')">🔗 Share</button>
                ${isAdmin ? `<button onclick="deleteMsg('${msg.id}')" style="background:#800; color:white;">🗑 Delete</button>` : ''}
            </div>
        `;
        
        if (msg.children && msg.children.length > 0) {
            const threadDiv = document.createElement('div');
            threadDiv.className = 'thread';
            for (let child of msg.children) {
                threadDiv.appendChild(renderMessage(child, level + 1));
            }
            div.appendChild(threadDiv);
        }
        
        return div;
    }

    function render(data) {
        const messagesArray = [];
        data.forEach(snap => {
            const m = snap.val();
            m.id = snap.key;
            messagesArray.push(m);
        });
        
        // Сортируем по времени
        messagesArray.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
        
        // Строим дерево: корневые сообщения (без parentId)
        const rootMessages = messagesArray.filter(m => !m.parentId || m.parentId === null);
        
        // Добавляем детей каждому сообщению
        for (let msg of messagesArray) {
            msg.children = messagesArray.filter(m => m.parentId === msg.id);
            msg.children.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
        }
        
        messagesDiv.innerHTML = '';
        
        for (let root of rootMessages) {
            root.level = 0;
            const msgDiv = renderMessage(root, 0);
            messagesDiv.appendChild(msgDiv);
        }
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Загрузка фото
    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            if (file.size > 2*1024*1024) return alert('Max 2MB');
            const reader = new FileReader();
            reader.onload = ev => {
                pendingImage = ev.target.result;
                document.getElementById('previewImg').src = pendingImage;
                document.getElementById('previewName').innerText = file.name.slice(0, 20);
                document.getElementById('imagePreview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
    });

    msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    // Восстановление сессии
    const saved = localStorage.getItem('gay_nick');
    if (saved) {
        currentUser = saved;
        loginScreen.classList.add('hidden');
        chatScreen.classList.remove('hidden');
    }
    isAdmin = localStorage.getItem('gay_admin') === 'true';

    ref.on('value', snap => { 
        if (!loginScreen.classList.contains('hidden')) return; 
        render(snap); 
    });
</script>
</body>
